<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-gray" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#888"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#dc2626"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="#f5f7fa" rx="16"/>

  <!-- ===== TOP HALF: Traditional Method ===== -->
  <rect x="20" y="14" width="920" height="272" fill="#fff" rx="12" stroke="#e0e4e8" stroke-width="1.5"/>
  <text x="44" y="48" font-size="17" font-weight="700" fill="#c62828">传统方法：从失败点之后，全量重跑所有后续步骤</text>

  <!-- Legend top -->
  <circle cx="660" cy="42" r="9" fill="#4caf50"/>
  <text x="675" y="47" font-size="13" fill="#555">正常执行</text>
  <circle cx="760" cy="42" r="9" fill="#dc2626"/>
  <text x="775" y="47" font-size="13" fill="#555">失败/重跑</text>

  <!-- Main branch nodes (top) -->
  <circle cx="80"  cy="155" r="28" fill="#4caf50" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="80"  y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">n1</text>

  <circle cx="200" cy="155" r="28" fill="#4caf50" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="200" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">n2</text>

  <!-- n3 failure -->
  <circle cx="320" cy="155" r="30" fill="#dc2626" stroke="#b71c1c" stroke-width="3"/>
  <text x="320" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">n3</text>
  <text x="320" y="200" text-anchor="middle" font-size="13" fill="#dc2626" font-weight="700">✗ 失败点</text>

  <!-- After failure: all red dashed -->
  <circle cx="430" cy="115" r="28" fill="#ef9a9a" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="430" y="121" text-anchor="middle" font-size="14" font-weight="700" fill="#c62828">n4</text>

  <circle cx="550" cy="115" r="28" fill="#ef9a9a" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="550" y="121" text-anchor="middle" font-size="14" font-weight="700" fill="#c62828">n5</text>

  <circle cx="430" cy="210" r="28" fill="#ef9a9a" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="430" y="216" text-anchor="middle" font-size="14" font-weight="700" fill="#c62828">n6</text>

  <circle cx="550" cy="210" r="28" fill="#ef9a9a" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="550" y="216" text-anchor="middle" font-size="14" font-weight="700" fill="#c62828">n7</text>

  <circle cx="670" cy="155" r="28" fill="#ef9a9a" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="670" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#c62828">n8</text>

  <circle cx="800" cy="155" r="28" fill="#ef9a9a" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="800" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#c62828">n9</text>

  <!-- Arrows top -->
  <line x1="108" y1="155" x2="170" y2="155" stroke="#888" stroke-width="2.5" marker-end="url(#arr-gray)"/>
  <line x1="228" y1="155" x2="288" y2="155" stroke="#888" stroke-width="2.5" marker-end="url(#arr-gray)"/>
  <line x1="344" y1="140" x2="400" y2="120" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
  <line x1="344" y1="170" x2="400" y2="204" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
  <line x1="458" y1="115" x2="520" y2="115" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
  <line x1="458" y1="210" x2="520" y2="210" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
  <line x1="578" y1="124" x2="640" y2="143" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
  <line x1="578" y1="200" x2="640" y2="167" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
  <line x1="698" y1="155" x2="770" y2="155" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>

  <!-- "全量重跑" label -->
  <rect x="400" y="66" width="430" height="26" fill="#fce4ec" rx="5"/>
  <text x="615" y="84" text-anchor="middle" font-size="14" font-weight="700" fill="#c62828">← 全量重跑（浪费大量计算）→</text>

  <!-- ===== DIVIDER ===== -->
  <line x1="40" y1="302" x2="920" y2="302" stroke="#e0e4e8" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- ===== BOTTOM HALF: AG-Repair ===== -->
  <rect x="20" y="316" width="920" height="288" fill="#fff" rx="12" stroke="#e0e4e8" stroke-width="1.5"/>
  <text x="44" y="350" font-size="17" font-weight="700" fill="#0d9488">AG-Repair：只修复根因（红）+ 被污染节点（橙），保留干净节点（绿）</text>

  <!-- Legend bottom -->
  <circle cx="580" cy="344" r="9" fill="#4caf50"/>
  <text x="595" y="349" font-size="13" fill="#555">保留 PRESERVE</text>
  <circle cx="700" cy="344" r="9" fill="#dc2626"/>
  <text x="715" y="349" font-size="13" fill="#555">根因 RERUN</text>
  <circle cx="800" cy="344" r="9" fill="#f97316"/>
  <text x="815" y="349" font-size="13" fill="#555">污染 PATCH/RERUN</text>

  <!-- Bottom nodes -->
  <circle cx="80"  cy="460" r="28" fill="#4caf50" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="80"  y="466" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">n1</text>

  <circle cx="200" cy="460" r="28" fill="#4caf50" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="200" y="466" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">n2</text>

  <!-- n3 root cause -->
  <circle cx="320" cy="460" r="32" fill="#dc2626" stroke="#b71c1c" stroke-width="3.5"/>
  <text x="320" y="466" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">n3</text>
  <text x="320" y="508" text-anchor="middle" font-size="13" fill="#dc2626" font-weight="700">根因</text>

  <!-- n4 orange -->
  <circle cx="430" cy="420" r="28" fill="#f97316" stroke="#c2410c" stroke-width="2.5"/>
  <text x="430" y="426" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">n4</text>

  <!-- n5 orange -->
  <circle cx="550" cy="420" r="28" fill="#f97316" stroke="#c2410c" stroke-width="2.5"/>
  <text x="550" y="426" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">n5</text>

  <!-- n6 green (not contaminated) -->
  <circle cx="430" cy="515" r="28" fill="#4caf50" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="430" y="521" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">n6</text>

  <!-- n7 green -->
  <circle cx="550" cy="515" r="28" fill="#4caf50" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="550" y="521" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">n7</text>

  <!-- n8 orange -->
  <circle cx="670" cy="460" r="28" fill="#f97316" stroke="#c2410c" stroke-width="2.5"/>
  <text x="670" y="466" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">n8</text>

  <!-- n9 green -->
  <circle cx="800" cy="460" r="28" fill="#4caf50" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="800" y="466" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">n9</text>

  <!-- Arrows bottom -->
  <line x1="108" y1="460" x2="170" y2="460" stroke="#888" stroke-width="2.5" marker-end="url(#arr-gray)"/>
  <line x1="228" y1="460" x2="288" y2="460" stroke="#888" stroke-width="2.5" marker-end="url(#arr-gray)"/>
  <line x1="344" y1="446" x2="400" y2="426" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <line x1="344" y1="474" x2="400" y2="509" stroke="#888" stroke-width="2.5" marker-end="url(#arr-gray)"/>
  <line x1="458" y1="420" x2="520" y2="420" stroke="#f97316" stroke-width="2.5" marker-end="url(#arr-orange)"/>
  <line x1="458" y1="515" x2="520" y2="515" stroke="#888" stroke-width="2.5" marker-end="url(#arr-gray)"/>
  <line x1="578" y1="430" x2="640" y2="450" stroke="#f97316" stroke-width="2.5" marker-end="url(#arr-orange)"/>
  <line x1="578" y1="506" x2="640" y2="472" stroke="#888" stroke-width="2.5" marker-end="url(#arr-gray)"/>
  <line x1="698" y1="460" x2="770" y2="460" stroke="#888" stroke-width="2.5" marker-end="url(#arr-gray)"/>

  <!-- Repair action badges -->
  <rect x="294" y="390" width="56" height="20" fill="#fce4ec" rx="4"/>
  <text x="322" y="404" text-anchor="middle" font-size="11" font-weight="700" fill="#c62828">RERUN</text>

  <rect x="404" y="382" width="56" height="20" fill="#fff3e0" rx="4"/>
  <text x="432" y="396" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">PATCH</text>

  <rect x="524" y="382" width="56" height="20" fill="#fff3e0" rx="4"/>
  <text x="552" y="396" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">PATCH</text>

  <rect x="644" y="424" width="56" height="20" fill="#fff3e0" rx="4"/>
  <text x="672" y="438" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">RERUN</text>

  <rect x="54"  cy="540" width="56" height="20" fill="#e8f5e9" rx="4"/>
  <text x="82"  y="554" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">KEEP</text>
  <rect x="174" y="540" width="56" height="20" fill="#e8f5e9" rx="4"/>
  <text x="202" y="554" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">KEEP</text>
  <rect x="404" y="548" width="56" height="20" fill="#e8f5e9" rx="4"/>
  <text x="432" y="562" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">KEEP</text>
  <rect x="524" y="548" width="56" height="20" fill="#e8f5e9" rx="4"/>
  <text x="552" y="562" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">KEEP</text>
  <rect x="774" y="540" width="56" height="20" fill="#e8f5e9" rx="4"/>
  <text x="802" y="554" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">KEEP</text>

  <!-- Savings label -->
  <rect x="390" y="576" width="430" height="24" fill="#e8f5e9" rx="5"/>
  <text x="605" y="593" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32">← 仅修复必要节点，保留 5/8 节点，大幅节省计算 →</text>
</svg>
