<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b71c1c"/>
      <stop offset="100%" style="stop-color:#e53935"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#455a64"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" rx="16" fill="#f5f7fa"/>

  <!-- Title -->
  <rect width="1100" height="60" rx="16" fill="url(#headerGrad)"/>
  <rect y="30" width="1100" height="30" fill="url(#headerGrad)"/>
  <text x="550" y="40" text-anchor="middle" fill="white" font-size="22" font-weight="700">错误识别与根因定位 — 候选发现 → 评分 → 排序</text>

  <!-- ========== SECTION 1: Candidate Nodes ========== -->
  <text x="60" y="105" font-size="16" font-weight="700" fill="#b71c1c">Step 1：候选错误节点发现</text>

  <!-- Timeline of nodes -->
  <line x1="80" y1="160" x2="1020" y2="160" stroke="#cfd8dc" stroke-width="2"/>

  <!-- Node e1 - clean -->
  <circle cx="130" cy="160" r="28" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">e₁</text>
  <text x="130" y="205" text-anchor="middle" font-size="10" fill="#5f6368">Planner</text>
  <text x="130" y="218" text-anchor="middle" font-size="9" fill="#9e9e9e">正常</text>

  <!-- Node e2 - clean -->
  <circle cx="250" cy="160" r="28" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">e₂</text>
  <text x="250" y="205" text-anchor="middle" font-size="10" fill="#5f6368">Tool Call</text>
  <text x="250" y="218" text-anchor="middle" font-size="9" fill="#9e9e9e">正常</text>

  <!-- Node e3 - HARD SIGNAL -->
  <circle cx="400" cy="160" r="32" fill="#fce4ec" stroke="#c62828" stroke-width="3" filter="url(#shadow)"/>
  <text x="400" y="155" text-anchor="middle" font-size="12" font-weight="800" fill="#c62828">e₃</text>
  <text x="400" y="172" text-anchor="middle" font-size="9" font-weight="600" fill="#c62828">⚠ 硬信号</text>
  <text x="400" y="210" text-anchor="middle" font-size="10" fill="#c62828" font-weight="600">Tool 调用失败</text>
  <text x="400" y="223" text-anchor="middle" font-size="9" fill="#c62828">异常 + 协议违规</text>

  <!-- Node e4 - soft signal -->
  <circle cx="550" cy="160" r="30" fill="#fff3e0" stroke="#e65100" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="550" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">e₄</text>
  <text x="550" y="172" text-anchor="middle" font-size="9" font-weight="600" fill="#e65100">⚡ 软信号</text>
  <text x="550" y="210" text-anchor="middle" font-size="10" fill="#e65100">结果偏离目标</text>
  <text x="550" y="223" text-anchor="middle" font-size="9" fill="#e65100">事实冲突</text>

  <!-- Node e5 - clean -->
  <circle cx="700" cy="160" r="28" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">e₅</text>
  <text x="700" y="205" text-anchor="middle" font-size="10" fill="#5f6368">Coder</text>
  <text x="700" y="218" text-anchor="middle" font-size="9" fill="#9e9e9e">正常</text>

  <!-- Node e6 - HARD SIGNAL -->
  <circle cx="850" cy="160" r="32" fill="#fce4ec" stroke="#c62828" stroke-width="3" filter="url(#shadow)"/>
  <text x="850" y="155" text-anchor="middle" font-size="12" font-weight="800" fill="#c62828">e₆</text>
  <text x="850" y="172" text-anchor="middle" font-size="9" font-weight="600" fill="#c62828">⚠ 硬信号</text>
  <text x="850" y="210" text-anchor="middle" font-size="10" fill="#c62828" font-weight="600">Verifier 失败</text>
  <text x="850" y="223" text-anchor="middle" font-size="9" fill="#c62828">约束断言失败</text>

  <!-- Node e7 - clean -->
  <circle cx="980" cy="160" r="28" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <text x="980" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">e₇</text>
  <text x="980" y="205" text-anchor="middle" font-size="10" fill="#5f6368">Writer</text>
  <text x="980" y="218" text-anchor="middle" font-size="9" fill="#9e9e9e">正常</text>

  <!-- Signal type legend -->
  <rect x="60" y="240" width="480" height="50" rx="8" fill="white" stroke="#e0e4e8" filter="url(#shadow)"/>
  <circle cx="90" cy="265" r="10" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="108" y="270" font-size="11" fill="#1a1a2e">硬信号：异常/工具失败/协议违规/verifier失败</text>
  <circle cx="370" cy="265" r="10" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="388" y="270" font-size="11" fill="#1a1a2e">软信号：偏离/冲突/遗漏</text>

  <!-- ========== SECTION 2: Scoring ========== -->
  <text x="60" y="330" font-size="16" font-weight="700" fill="#b71c1c">Step 2：根因评分 S_root(v) = α·A(v) + β·I(v) + γ·D(v) + δ·R(v)</text>

  <!-- Scoring cards for candidate nodes -->
  <!-- e3 scoring -->
  <rect x="80" y="355" width="300" height="190" rx="12" fill="white" stroke="#c62828" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="355" width="300" height="36" rx="12" fill="#c62828"/>
  <rect x="80" y="375" width="300" height="16" fill="#c62828"/>
  <text x="230" y="378" text-anchor="middle" font-size="14" font-weight="700" fill="white">节点 e₃ — Tool 调用失败</text>

  <text x="100" y="415" font-size="12" fill="#c62828" font-weight="600">A(v) 异常强度</text>
  <rect x="210" y="403" width="150" height="16" rx="4" fill="#ffebee"/>
  <rect x="210" y="403" width="135" height="16" rx="4" fill="#ef5350"/>
  <text x="370" y="415" font-size="11" fill="#c62828" font-weight="700">0.90</text>

  <text x="100" y="440" font-size="12" fill="#e65100" font-weight="600">I(v) 影响强度</text>
  <rect x="210" y="428" width="150" height="16" rx="4" fill="#fff3e0"/>
  <rect x="210" y="428" width="120" height="16" rx="4" fill="#ff9800"/>
  <text x="370" y="440" font-size="11" fill="#e65100" font-weight="700">0.80</text>

  <text x="100" y="465" font-size="12" fill="#6a1b9a" font-weight="600">D(v) 偏离程度</text>
  <rect x="210" y="453" width="150" height="16" rx="4" fill="#f3e5f5"/>
  <rect x="210" y="453" width="105" height="16" rx="4" fill="#ab47bc"/>
  <text x="370" y="465" font-size="11" fill="#6a1b9a" font-weight="700">0.70</text>

  <text x="100" y="490" font-size="12" fill="#2e7d32" font-weight="600">R(v) 修复收益</text>
  <rect x="210" y="478" width="150" height="16" rx="4" fill="#e8f5e9"/>
  <rect x="210" y="478" width="127" height="16" rx="4" fill="#66bb6a"/>
  <text x="370" y="490" font-size="11" fill="#2e7d32" font-weight="700">0.85</text>

  <rect x="100" y="505" width="260" height="28" rx="6" fill="#fce4ec"/>
  <text x="230" y="524" text-anchor="middle" font-size="14" font-weight="800" fill="#c62828">S_root = 0.83 ★</text>

  <!-- e4 scoring -->
  <rect x="410" y="355" width="300" height="190" rx="12" fill="white" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
  <rect x="410" y="355" width="300" height="36" rx="12" fill="#e65100"/>
  <rect x="410" y="375" width="300" height="16" fill="#e65100"/>
  <text x="560" y="378" text-anchor="middle" font-size="14" font-weight="700" fill="white">节点 e₄ — 结果偏离</text>

  <text x="430" y="415" font-size="12" fill="#c62828" font-weight="600">A(v) 异常强度</text>
  <rect x="540" y="403" width="150" height="16" rx="4" fill="#ffebee"/>
  <rect x="540" y="403" width="75" height="16" rx="4" fill="#ef5350"/>
  <text x="700" y="415" font-size="11" fill="#c62828" font-weight="700">0.50</text>

  <text x="430" y="440" font-size="12" fill="#e65100" font-weight="600">I(v) 影响强度</text>
  <rect x="540" y="428" width="150" height="16" rx="4" fill="#fff3e0"/>
  <rect x="540" y="428" width="60" height="16" rx="4" fill="#ff9800"/>
  <text x="700" y="440" font-size="11" fill="#e65100" font-weight="700">0.40</text>

  <text x="430" y="465" font-size="12" fill="#6a1b9a" font-weight="600">D(v) 偏离程度</text>
  <rect x="540" y="453" width="150" height="16" rx="4" fill="#f3e5f5"/>
  <rect x="540" y="453" width="90" height="16" rx="4" fill="#ab47bc"/>
  <text x="700" y="465" font-size="11" fill="#6a1b9a" font-weight="700">0.60</text>

  <text x="430" y="490" font-size="12" fill="#2e7d32" font-weight="600">R(v) 修复收益</text>
  <rect x="540" y="478" width="150" height="16" rx="4" fill="#e8f5e9"/>
  <rect x="540" y="478" width="67" height="16" rx="4" fill="#66bb6a"/>
  <text x="700" y="490" font-size="11" fill="#2e7d32" font-weight="700">0.45</text>

  <rect x="430" y="505" width="260" height="28" rx="6" fill="#fff3e0"/>
  <text x="560" y="524" text-anchor="middle" font-size="14" font-weight="800" fill="#e65100">S_root = 0.49</text>

  <!-- e6 scoring -->
  <rect x="740" y="355" width="300" height="190" rx="12" fill="white" stroke="#c62828" stroke-width="2" filter="url(#shadow)"/>
  <rect x="740" y="355" width="300" height="36" rx="12" fill="#c62828"/>
  <rect x="740" y="375" width="300" height="16" fill="#c62828"/>
  <text x="890" y="378" text-anchor="middle" font-size="14" font-weight="700" fill="white">节点 e₆ — Verifier 失败</text>

  <text x="760" y="415" font-size="12" fill="#c62828" font-weight="600">A(v) 异常强度</text>
  <rect x="870" y="403" width="150" height="16" rx="4" fill="#ffebee"/>
  <rect x="870" y="403" width="142" height="16" rx="4" fill="#ef5350"/>
  <text x="1030" y="415" font-size="11" fill="#c62828" font-weight="700">0.95</text>

  <text x="760" y="440" font-size="12" fill="#e65100" font-weight="600">I(v) 影响强度</text>
  <rect x="870" y="428" width="150" height="16" rx="4" fill="#fff3e0"/>
  <rect x="870" y="428" width="45" height="16" rx="4" fill="#ff9800"/>
  <text x="1030" y="440" font-size="11" fill="#e65100" font-weight="700">0.30</text>

  <text x="760" y="465" font-size="12" fill="#6a1b9a" font-weight="600">D(v) 偏离程度</text>
  <rect x="870" y="453" width="150" height="16" rx="4" fill="#f3e5f5"/>
  <rect x="870" y="453" width="120" height="16" rx="4" fill="#ab47bc"/>
  <text x="1030" y="465" font-size="11" fill="#6a1b9a" font-weight="700">0.80</text>

  <text x="760" y="490" font-size="12" fill="#2e7d32" font-weight="600">R(v) 修复收益</text>
  <rect x="870" y="478" width="150" height="16" rx="4" fill="#e8f5e9"/>
  <rect x="870" y="478" width="97" height="16" rx="4" fill="#66bb6a"/>
  <text x="1030" y="490" font-size="11" fill="#2e7d32" font-weight="700">0.65</text>

  <rect x="760" y="505" width="260" height="28" rx="6" fill="#fce4ec"/>
  <text x="890" y="524" text-anchor="middle" font-size="14" font-weight="800" fill="#c62828">S_root = 0.70</text>

  <!-- ========== SECTION 3: Ranking ========== -->
  <text x="60" y="590" font-size="16" font-weight="700" fill="#b71c1c">Step 3：根因排序与选择</text>

  <!-- Ranking podium -->
  <rect x="80" y="610" width="1000" height="190" rx="12" fill="white" stroke="#e0e4e8" filter="url(#shadow)"/>

  <!-- Rank 1 -->
  <rect x="120" y="640" width="260" height="130" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <rect x="120" y="640" width="260" height="32" rx="10" fill="#c62828"/>
  <rect x="120" y="660" width="260" height="12" fill="#c62828"/>
  <text x="250" y="662" text-anchor="middle" font-size="14" font-weight="800" fill="white">🏆 Rank #1 — 首选根因</text>
  <text x="250" y="700" text-anchor="middle" font-size="18" font-weight="800" fill="#c62828">e₃ (S=0.83)</text>
  <text x="250" y="722" text-anchor="middle" font-size="12" fill="#5f6368">Tool 调用失败 · 硬信号</text>
  <text x="250" y="742" text-anchor="middle" font-size="11" fill="#5f6368">最早引入 + 高影响 + 高修复收益</text>
  <text x="250" y="760" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">→ 优先单根因修复</text>

  <!-- Rank 2 -->
  <rect x="420" y="640" width="260" height="130" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <rect x="420" y="640" width="260" height="32" rx="10" fill="#e65100"/>
  <rect x="420" y="660" width="260" height="12" fill="#e65100"/>
  <text x="550" y="662" text-anchor="middle" font-size="14" font-weight="700" fill="white">Rank #2 — 备选</text>
  <text x="550" y="700" text-anchor="middle" font-size="18" font-weight="800" fill="#e65100">e₆ (S=0.70)</text>
  <text x="550" y="722" text-anchor="middle" font-size="12" fill="#5f6368">Verifier 失败 · 硬信号</text>
  <text x="550" y="742" text-anchor="middle" font-size="11" fill="#5f6368">高异常强度但影响范围较小</text>
  <text x="550" y="760" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">→ 首次失败后升级联合修复</text>

  <!-- Rank 3 -->
  <rect x="720" y="640" width="260" height="130" rx="10" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
  <rect x="720" y="640" width="260" height="32" rx="10" fill="#78909c"/>
  <rect x="720" y="660" width="260" height="12" fill="#78909c"/>
  <text x="850" y="662" text-anchor="middle" font-size="14" font-weight="700" fill="white">Rank #3 — 低优先级</text>
  <text x="850" y="700" text-anchor="middle" font-size="18" font-weight="800" fill="#78909c">e₄ (S=0.49)</text>
  <text x="850" y="722" text-anchor="middle" font-size="12" fill="#5f6368">结果偏离 · 软信号</text>
  <text x="850" y="742" text-anchor="middle" font-size="11" fill="#5f6368">影响有限，可能是下游症状</text>
  <text x="850" y="760" text-anchor="middle" font-size="11" font-weight="600" fill="#78909c">→ 暂不处理，观察修复效果</text>
</svg>